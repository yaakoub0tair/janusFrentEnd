<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Habit</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header">
          <h4>Create Habit</h4>
        </div>

        <div class="card-body">
          <form method="POST" id="form">
            <!-- Title -->
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input
                type="text"
                class="form-control"
                name="title"
                placeholder="Habit title"
                required
              />
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea
                class="form-control"
                name="description"
                rows="3"
              ></textarea>
            </div>

            <!-- Frequency -->
            <div class="mb-3">
              <label class="form-label">Frequency</label>
              <select class="form-select" name="frequency">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>

            <!-- Target Days -->
            <div class="mb-3">
              <label class="form-label">Target Days</label>
              <input
                type="number"
                class="form-control"
                name="target_days"
                min="1"
                required
              />
            </div>

            <!-- Color Code -->
            <div class="mb-3">
              <label class="form-label">Color</label>
              <input
                type="color"
                class="form-control form-control-color"
                name="color_code"
                value="#563d7c"
              />
            </div>

            <button type="submit" class="btn btn-primary">Create Habit</button>
          </form>
        </div>
      </div>
    </div>
    <script>
      const myHeaders = new Headers();
      const token = localStorage.getItem("ACCESS-TOKEN");
      myHeaders.append("Accept", "application/json");
      myHeaders.append("Content-Type", "application/json");
      myHeaders.append("Authorization", `Bearer ${token}`);

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        let forme = this;
        let formdata = new FormData(forme);

        // console.log(formdata)

        let data = {};

        formdata.forEach((value, key) => {
          data[key] = value;
        });

        console.log(data);

        const raw = JSON.stringify(data);
        const requestOptions = {
          method: "POST",
          headers: myHeaders,
          body: raw,
          redirect: "follow",
        };

        fetch("http://13.62.45.197/api/habits", requestOptions)
          .then((response) => response.text())
          .then((result) => console.log(result))
          .catch((error) => console.error(error));
      });
    </script>
  </body>
</html>
